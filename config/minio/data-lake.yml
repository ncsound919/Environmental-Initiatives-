# ECOS Data Lake - MinIO Configuration
# Self-hosted S3-compatible object storage for unified telemetry analytics
#
# Deploy: docker compose -f docker-compose.yml -f config/minio/data-lake.yml up -d minio
# Admin UI: http://localhost:9001  (login: see MINIO_ROOT_USER/PASSWORD in .env)
# S3 API:   http://localhost:9000
#
# Bucket structure:
#   ecos-telemetry/        - Raw MQTT telemetry (Parquet, partitioned by project/date)
#   ecos-ml-models/        - Trained Prophet + LSTM model artifacts
#   ecos-reports/          - Generated analytics reports (PDF, CSV)
#   ecos-firmware/         - ESP32 OTA firmware binaries
#   ecos-carbon/           - Carbon credit calculation audit logs

version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    container_name: ecos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ecos_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ecos_secret_change_me}
      MINIO_VOLUMES: "/data"
      # Enable automatic bucket versioning for audit trail
      MINIO_VERSIONING: "on"
    volumes:
      - minio_data:/data
      - ./config/minio/policies:/etc/minio/policies:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ecos-network

  # MinIO setup: creates required buckets on first run
  minio-setup:
    image: minio/mc:RELEASE.2024-04-06T16-28-13Z
    container_name: ecos-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ecos_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ecos_secret_change_me}
    entrypoint: |
      /bin/sh -c "
        mc alias set ecos http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD

        # Create core buckets
        mc mb --ignore-existing ecos/ecos-telemetry
        mc mb --ignore-existing ecos/ecos-ml-models
        mc mb --ignore-existing ecos/ecos-reports
        mc mb --ignore-existing ecos/ecos-firmware
        mc mb --ignore-existing ecos/ecos-carbon

        # Set lifecycle policies: auto-archive raw telemetry after 90 days
        mc ilm import ecos/ecos-telemetry <<EOF
        {\"Rules\":[{\"ID\":\"archive-old-telemetry\",\"Status\":\"Enabled\",
          \"Filter\":{\"Prefix\":\"\"},
          \"Transitions\":[{\"Days\":90,\"StorageClass\":\"GLACIER\"}],
          \"Expiration\":{\"Days\":365}}]}
        EOF

        # Create service account for the API gateway
        mc admin user add ecos ecos_api_user ${MINIO_API_PASSWORD:-api_secret_change_me}
        mc admin policy attach ecos readwrite --user ecos_api_user

        echo 'MinIO setup complete'
      "
    networks:
      - ecos-network
    restart: on-failure

volumes:
  minio_data:
    name: ecos_minio_data

networks:
  ecos-network:
    external: true
    name: ecos-network

